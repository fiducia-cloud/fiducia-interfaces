name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # generator self-tests (no writes, no network)
      - run: node --test src/*.test.mjs
      # fail if the checked-in generated/ files are stale vs the schemas
      - run: node src/generate.mjs --check
